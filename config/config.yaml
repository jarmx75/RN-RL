assets:
  - EURUSD
  - GBPUSD
  - AUDUSD
  - USDJPY
  - USDCHF
  - EURJPY
  - GBPJPY
  - NZDUSD
  - EURGBP
  - EURCHF
timeframes: [60, 300, 900]
window_size: 60
threshold: 0.7
amount: 5.0
amount_percent: false
risk:
  max_consecutive_losses: 3
  daily_stop_loss: -50.0
  daily_take_profit: 100.0
  trading_hours:
    start: "06:00"
    end: "21:00"
  pause_after_losses: 2
  pause_duration_minutes: 10
  dynamic_threshold:
    enabled: false
    step: 0.02
    max: 0.85
    min: 0.65
logging:
  csv_path: storage/trades.csv
  sqlite_path: storage/trades.db
  equity_csv: storage/equity.csv
model:
  algo: PPO
  total_steps: 200000
  batch_size: 256
  learning_rate: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  n_steps: 2048
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  seed: 42
  num_envs: 8
  eval_interval: 50000
  validation_days: 14
live:
  min_probability: 0.7
  order_timeout: 10
  reconnect_interval: 5
  candle_buffer: 128
storage:
  data_dir: data
  artifacts_dir: artifacts
